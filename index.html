<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1e40af" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="दुकान हिसाब" />
  <meta name="description" content="दुकान का पूरा हिसाब-किताब एक जगह" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>दुकान हिसाब</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Noto Sans', Arial, sans-serif; background: #f1f5f9; min-height: 100vh; overscroll-behavior: none; }

    /* Header */
    .header { background: linear-gradient(135deg, #1e40af 0%, #7c3aed 100%); padding: 20px 16px 56px; color: #fff; position: relative; }
    .header h1 { font-size: 22px; font-weight: 800; }
    .header p { font-size: 13px; opacity: 0.8; margin-top: 3px; }

    /* Tab Nav */
    .tab-nav { position: sticky; top: 0; z-index: 100; background: #fff; box-shadow: 0 2px 8px #0001; margin: -36px 12px 0; border-radius: 14px; padding: 8px 6px; display: flex; gap: 4px; }
    .tab-btn { flex: 1; padding: 8px 2px; border: none; border-radius: 10px; background: transparent; color: #64748b; font-weight: 700; cursor: pointer; font-size: 10px; font-family: inherit; transition: all 0.2s; }
    .tab-btn.active { color: #fff; }

    /* Content */
    .content { padding: 16px 12px 80px; }

    /* Cards */
    .card { background: #fff; border-radius: 12px; padding: 14px; margin-bottom: 10px; border: 1.5px solid #e2e8f0; box-shadow: 0 1px 4px #0001; }
    .card-row { display: flex; justify-content: space-between; align-items: flex-start; }

    /* Stats grid */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .stat-card { background: #fff; border-radius: 10px; padding: 12px; text-align: center; }
    .stat-label { font-size: 11px; color: #64748b; margin-bottom: 2px; }
    .stat-val { font-size: 15px; font-weight: 800; }
    .stat-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }

    /* Buttons */
    .btn { display: inline-block; padding: 10px 18px; border-radius: 10px; border: none; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; transition: opacity 0.15s; }
    .btn:active { opacity: 0.8; }
    .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 8px; }
    .btn-outline { background: transparent !important; border: 2px solid; }

    /* Modal */
    .modal-bg { position: fixed; inset: 0; background: #00000080; z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 16px; }
    .modal { background: #fff; border-radius: 16px; padding: 22px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px #0004; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
    .modal-title { font-size: 17px; font-weight: 800; color: #1e293b; }
    .close-btn { background: #f1f5f9; border: none; border-radius: 8px; width: 32px; height: 32px; cursor: pointer; font-size: 18px; color: #64748b; }

    /* Inputs */
    .field { margin-bottom: 13px; }
    .field label { display: block; font-size: 12px; font-weight: 700; color: #475569; margin-bottom: 5px; }
    .field input, .field select, .field textarea { width: 100%; padding: 10px 12px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 14px; outline: none; font-family: inherit; background: #f8fafc; color: #1e293b; }
    .field input:focus, .field select:focus { border-color: #7c3aed; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* Badge */
    .badge { display: inline-block; border-radius: 6px; padding: 2px 8px; font-size: 11px; font-weight: 700; border: 1.5px solid; }

    /* Payment toggle */
    .pay-toggle { display: flex; gap: 10px; }
    .pay-opt { flex: 1; padding: 10px; border-radius: 10px; border: 2px solid #e2e8f0; background: #f8fafc; font-weight: 700; cursor: pointer; font-size: 13px; font-family: inherit; transition: all 0.2s; }

    /* Bar chart */
    .bar-wrap { display: flex; align-items: flex-end; gap: 5px; height: 90px; }
    .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .bar { width: 100%; border-radius: 4px 4px 0 0; min-height: 4px; transition: height 0.3s; }
    .bar-label { font-size: 9px; color: #94a3b8; }
    .bar-amt { font-size: 8px; font-weight: 700; }

    /* Empty */
    .empty { text-align: center; padding: 48px 24px; color: #94a3b8; }
    .empty-icon { font-size: 48px; margin-bottom: 10px; }

    /* Image preview */
    .img-upload { border: 2px dashed #c7d2fe; border-radius: 12px; padding: 20px; text-align: center; cursor: pointer; background: #f8fafc; }
    .img-upload img { max-height: 120px; border-radius: 8px; }
    .img-lightbox { position: fixed; inset: 0; background: #000c; z-index: 2000; display: flex; align-items: center; justify-content: center; cursor: zoom-out; }
    .img-lightbox img { max-width: 95vw; max-height: 95vh; border-radius: 12px; }

    /* Install banner */
    .install-banner { position: fixed; bottom: 0; left: 0; right: 0; background: #1e40af; color: #fff; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; z-index: 500; box-shadow: 0 -4px 20px #0003; }
    .install-banner p { font-size: 13px; font-weight: 600; }
    .install-banner small { font-size: 11px; opacity: 0.8; display: block; }

    .hidden { display: none !important; }
    .flex-end { display: flex; justify-content: flex-end; }
    .flex-gap { display: flex; gap: 10px; margin-top: 10px; }
    .mt4 { margin-top: 4px; }
    .mt6 { margin-top: 6px; }
    .red { color: #ef4444; }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <h1>🏪 दुकान हिसाब</h1>
  <p>आपका पूरा हिसाब-किताब एक जगह</p>
</div>

<!-- Tab Nav -->
<div class="tab-nav" id="tabNav"></div>

<!-- Content -->
<div class="content" id="appContent"></div>

<!-- Install Banner -->
<div class="install-banner hidden" id="installBanner">
  <div>
    <p>📲 ऐप इंस्टॉल करें</p>
    <small>होम स्क्रीन पर जोड़ें — बिल्कुल ऐप जैसा!</small>
  </div>
  <div style="display:flex;gap:8px">
    <button onclick="installApp()" class="btn btn-sm" style="background:#fff;color:#1e40af">इंस्टॉल</button>
    <button onclick="document.getElementById('installBanner').classList.add('hidden')" class="btn btn-sm" style="background:transparent;color:#fff;border:1.5px solid #ffffff60">बाद में</button>
  </div>
</div>

<!-- Modals -->
<div id="modalContainer"></div>

<script>
// ── Storage helpers ──────────────────────────────────────────────────
const DB = {
  get: k => { try { return JSON.parse(localStorage.getItem(k) || '[]'); } catch { return []; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }
};
const KEYS = { kharid: 'dk_kharid', bikri: 'dk_bikri', udhar: 'dk_udhar' };

// ── Utils ────────────────────────────────────────────────────────────
const fDate = iso => iso ? new Date(iso).toLocaleDateString('hi-IN', { day:'2-digit', month:'2-digit', year:'numeric' }) : '';
const fMoney = n => '₹' + Number(n||0).toLocaleString('hi-IN');
const uid = () => Date.now() + Math.random().toString(36).slice(2);
const today = () => new Date().toISOString().slice(0,10);

// ── Tabs config ──────────────────────────────────────────────────────
const TABS = [
  { id:'kharid', label:'📦 खरीद', color:'#2563eb' },
  { id:'bikri',  label:'🛒 बिक्री', color:'#16a34a' },
  { id:'udhar',  label:'📋 उधार',  color:'#d97706' },
  { id:'report', label:'📊 रिपोर्ट', color:'#dc2626' },
];
let activeTab = 'kharid';

function renderTabs() {
  document.getElementById('tabNav').innerHTML = TABS.map(t =>
    `<button class="tab-btn ${activeTab===t.id?'active':''}"
      style="${activeTab===t.id?`background:${t.color}`:''}"
      onclick="switchTab('${t.id}')">${t.label}</button>`
  ).join('');
}

function switchTab(id) {
  activeTab = id;
  renderTabs();
  renderContent();
}

// ── Modal ────────────────────────────────────────────────────────────
function showModal(id, title, bodyHtml) {
  closeModal();
  document.getElementById('modalContainer').innerHTML = `
    <div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">${title}</div>
          <button class="close-btn" onclick="closeModal()">×</button>
        </div>
        <div id="modalBody">${bodyHtml}</div>
      </div>
    </div>`;
}
function closeModal() {
  document.getElementById('modalContainer').innerHTML = '';
}

// ── KHARID ───────────────────────────────────────────────────────────
let _kharidImg = null;

function renderKharid() {
  const items = DB.get(KEYS.kharid);
  const total = items.reduce((s,i) => s + (+i.kul||0), 0);
  let html = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div>
        <div style="font-size:12px;color:#64748b">कुल खरीद</div>
        <div style="font-size:22px;font-weight:800;color:#2563eb">${fMoney(total)}</div>
      </div>
      <button class="btn" style="background:#2563eb;color:#fff" onclick="openKharidForm()">+ नई खरीद</button>
    </div>`;
  if (!items.length) html += `<div class="empty"><div class="empty-icon">📦</div>अभी तक कोई खरीद दर्ज नहीं की</div>`;
  else items.forEach(i => {
    html += `<div class="card">
      <div style="display:flex;gap:10px;align-items:flex-start">
        ${i.img
          ? `<img src="${i.img}" onclick="showKharidImg('${i.id}')" style="width:56px;height:56px;object-fit:cover;border-radius:8px;cursor:zoom-in;border:1.5px solid #bfdbfe;flex-shrink:0" />`
          : `<div style="width:56px;height:56px;border-radius:8px;background:#eff6ff;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0">📦</div>`}
        <div style="flex:1">
          <div style="font-weight:700;font-size:16px;color:#1e293b">${i.saman}</div>
          ${i.supplier?`<div style="font-size:13px;color:#64748b">🏪 ${i.supplier}</div>`:''}
          <div style="font-size:13px;color:#64748b" class="mt4">${i.qty} ${i.unit||''} ${i.rate?`× ₹${i.rate}`:''}</div>
          ${i.billno?`<div style="font-size:12px;color:#7c3aed">🧾 बिल नं: ${i.billno}</div>`:''}
          ${i.note?`<div style="font-size:12px;color:#94a3b8">📝 ${i.note}</div>`:''}
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-weight:800;font-size:18px;color:#2563eb">${fMoney(i.kul)}</div>
          <div style="font-size:12px;color:#94a3b8">${fDate(i.tarikh)}</div>
          <button onclick="delItem('kharid','${i.id}')" style="background:none;border:none;color:#ef4444;cursor:pointer;font-size:18px;margin-top:4px">🗑</button>
        </div>
      </div>
    </div>`;
  });
  return html;
}

function showKharidImg(id) {
  const item = DB.get(KEYS.kharid).find(i=>i.id===id);
  if(!item||!item.img) return;
  const lb = document.createElement('div');
  lb.className='img-lightbox';
  lb.innerHTML=`<img src="${item.img}" />`;
  lb.onclick=()=>lb.remove();
  document.body.appendChild(lb);
}

function openKharidForm() {
  _kharidImg = null;
  showModal('kharid','नई खरीद दर्ज करें', `
    <div class="field"><label>सामान का नाम *</label><input id="k_saman" placeholder="जैसे: चावल, दाल..." /></div>
    <div class="field"><label>सप्लायर / दुकान का नाम</label><input id="k_supplier" placeholder="सप्लायर का नाम" /></div>
    <div class="grid2">
      <div class="field"><label>मात्रा *</label><input id="k_qty" type="number" placeholder="0" oninput="calcKharid()" /></div>
      <div class="field"><label>इकाई</label><input id="k_unit" placeholder="kg, piece..." /></div>
    </div>
    <div class="grid2">
      <div class="field"><label>दर (₹)</label><input id="k_rate" type="number" placeholder="0" oninput="calcKharid()" /></div>
      <div class="field"><label>कुल राशि (₹)</label><input id="k_kul" type="number" placeholder="0" /></div>
    </div>
    <div class="grid2">
      <div class="field"><label>तारीख</label><input id="k_tarikh" type="date" value="${today()}" /></div>
      <div class="field"><label>बिल नंबर</label><input id="k_billno" placeholder="INV-001" /></div>
    </div>
    <div class="field">
      <label>बिल की फोटो अपलोड करें</label>
      <div class="img-upload" id="kImgBox" onclick="document.getElementById('kFileInput').click()">
        <div id="kImgPreview" style="color:#2563eb"><div style="font-size:28px">📷</div><div style="font-size:12px">बिल की फोटो लें या चुनें (वैकल्पिक)</div></div>
      </div>
      <input type="file" id="kFileInput" accept="image/*" style="display:none" onchange="handleKharidImg(event)" />
    </div>
    <div class="field"><label>नोट</label><input id="k_note" placeholder="अतिरिक्त जानकारी..." /></div>
    <div class="flex-gap">
      <button class="btn" style="background:#2563eb;color:#fff" onclick="saveKharid()">सेव करें</button>
      <button class="btn btn-outline" style="color:#64748b;border-color:#64748b" onclick="closeModal()">रद्द करें</button>
    </div>`);
}

function handleKharidImg(e) {
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    _kharidImg=ev.target.result;
    document.getElementById('kImgPreview').innerHTML=`<img src="${_kharidImg}" style="max-height:110px;border-radius:8px" />`;
  };
  reader.readAsDataURL(file);
}

function calcKharid() {
  const q = +document.getElementById('k_qty')?.value||0;
  const r = +document.getElementById('k_rate')?.value||0;
  if(q && r) document.getElementById('k_kul').value = (q*r).toFixed(2);
}

function saveKharid() {
  const saman = document.getElementById('k_saman').value.trim();
  const qty = document.getElementById('k_qty').value.trim();
  if (!saman || !qty) { alert('सामान का नाम और मात्रा जरूरी है'); return; }
  const items = DB.get(KEYS.kharid);
  items.unshift({ id: uid(), saman, supplier: document.getElementById('k_supplier').value, qty, unit: document.getElementById('k_unit').value, rate: document.getElementById('k_rate').value, kul: document.getElementById('k_kul').value, tarikh: document.getElementById('k_tarikh').value, billno: document.getElementById('k_billno').value, note: document.getElementById('k_note').value, img: _kharidImg });
  DB.set(KEYS.kharid, items);
  _kharidImg = null;
  closeModal(); renderContent();
}

// ── BIKRI ────────────────────────────────────────────────────────────
function renderBikri() {
  const items = DB.get(KEYS.bikri);
  const total = items.reduce((s,i)=>s+(+i.kul||0),0);
  const naqad = items.filter(i=>i.bhugtan==='naqad').reduce((s,i)=>s+(+i.kul||0),0);
  const udhar = items.filter(i=>i.bhugtan==='udhar').reduce((s,i)=>s+(+i.kul||0),0);
  let html = `
    <div class="stats-grid" style="margin-bottom:16px">
      <div class="stat-card" style="border:1.5px solid #16a34a30"><div class="stat-label">कुल बिक्री</div><div class="stat-val" style="color:#16a34a">${fMoney(total)}</div></div>
      <div class="stat-card" style="border:1.5px solid #2563eb30"><div class="stat-label">नकद</div><div class="stat-val" style="color:#2563eb">${fMoney(naqad)}</div></div>
      <div class="stat-card" style="border:1.5px solid #d9780630"><div class="stat-label">उधार</div><div class="stat-val" style="color:#d97706">${fMoney(udhar)}</div></div>
    </div>
    <div class="flex-end" style="margin-bottom:12px">
      <button class="btn" style="background:#16a34a;color:#fff" onclick="openBikriForm()">+ नई बिक्री</button>
    </div>`;
  if (!items.length) html += `<div class="empty"><div class="empty-icon">🛒</div>अभी तक कोई बिक्री दर्ज नहीं की</div>`;
  else items.forEach(i => {
    const bc = i.bhugtan==='naqad'?'#16a34a':'#d97706';
    html += `<div class="card">
      <div class="card-row">
        <div>
          <div style="font-weight:700;font-size:16px;color:#1e293b">${i.saman}</div>
          ${i.grahak?`<div style="font-size:13px;color:#64748b">👤 ${i.grahak}</div>`:''}
          <div style="font-size:13px;color:#64748b" class="mt4">${i.qty} ${i.unit||''} ${i.rate?`× ₹${i.rate}`:''}</div>
          <div class="mt4"><span class="badge" style="color:${bc};border-color:${bc};background:${bc}20">${i.bhugtan==='naqad'?'नकद':'उधार'}</span></div>
        </div>
        <div style="text-align:right">
          <div style="font-weight:800;font-size:18px;color:#16a34a">${fMoney(i.kul)}</div>
          <div style="font-size:12px;color:#94a3b8">${fDate(i.tarikh)}</div>
          <button onclick="delItem('bikri','${i.id}')" style="background:none;border:none;color:#ef4444;cursor:pointer;font-size:18px;margin-top:4px">🗑</button>
        </div>
      </div>
    </div>`;
  });
  return html;
}

function openBikriForm(bhugtan='naqad') {
  showModal('bikri','नई बिक्री दर्ज करें', `
    <div class="field"><label>सामान का नाम *</label><input id="b_saman" placeholder="जैसे: चीनी, तेल..." /></div>
    <div class="field"><label>ग्राहक का नाम</label><input id="b_grahak" placeholder="ग्राहक का नाम" /></div>
    <div class="grid2">
      <div class="field"><label>मात्रा *</label><input id="b_qty" type="number" placeholder="0" oninput="calcBikri()" /></div>
      <div class="field"><label>इकाई</label><input id="b_unit" placeholder="kg, piece..." /></div>
    </div>
    <div class="grid2">
      <div class="field"><label>दर (₹)</label><input id="b_rate" type="number" placeholder="0" oninput="calcBikri()" /></div>
      <div class="field"><label>कुल राशि (₹)</label><input id="b_kul" type="number" placeholder="0" /></div>
    </div>
    <div class="field">
      <label>भुगतान का तरीका</label>
      <div class="pay-toggle">
        <button class="pay-opt" id="po_naqad" style="border-color:#16a34a;background:#f0fdf4;color:#16a34a" onclick="selectPay('naqad')">💵 नकद</button>
        <button class="pay-opt" id="po_udhar" onclick="selectPay('udhar')">📋 उधार</button>
      </div>
      <input type="hidden" id="b_bhugtan" value="naqad" />
    </div>
    <div class="field"><label>तारीख</label><input id="b_tarikh" type="date" value="${today()}" /></div>
    <div class="field"><label>नोट</label><input id="b_note" placeholder="अतिरिक्त जानकारी..." /></div>
    <div class="flex-gap">
      <button class="btn" style="background:#16a34a;color:#fff" onclick="saveBikri()">सेव करें</button>
      <button class="btn btn-outline" style="color:#64748b;border-color:#64748b" onclick="closeModal()">रद्द करें</button>
    </div>`);
}

function selectPay(v) {
  document.getElementById('b_bhugtan').value = v;
  const nEl = document.getElementById('po_naqad');
  const uEl = document.getElementById('po_udhar');
  if(v==='naqad') { nEl.style.cssText='border-color:#16a34a;background:#f0fdf4;color:#16a34a'; uEl.style.cssText='border-color:#e2e8f0;background:#f8fafc;color:#64748b'; }
  else { uEl.style.cssText='border-color:#d97706;background:#fffbeb;color:#d97706'; nEl.style.cssText='border-color:#e2e8f0;background:#f8fafc;color:#64748b'; }
}

function calcBikri() {
  const q=+document.getElementById('b_qty')?.value||0, r=+document.getElementById('b_rate')?.value||0;
  if(q&&r) document.getElementById('b_kul').value=(q*r).toFixed(2);
}

function saveBikri() {
  const saman=document.getElementById('b_saman').value.trim(), qty=document.getElementById('b_qty').value.trim();
  if(!saman||!qty){alert('सामान का नाम और मात्रा जरूरी है');return;}
  const items=DB.get(KEYS.bikri);
  items.unshift({id:uid(),saman,grahak:document.getElementById('b_grahak').value,qty,unit:document.getElementById('b_unit').value,rate:document.getElementById('b_rate').value,kul:document.getElementById('b_kul').value,bhugtan:document.getElementById('b_bhugtan').value,tarikh:document.getElementById('b_tarikh').value,note:document.getElementById('b_note').value});
  DB.set(KEYS.bikri,items); closeModal(); renderContent();
}

// ── UDHAR ────────────────────────────────────────────────────────────
function renderUdhar() {
  const items = DB.get(KEYS.udhar);
  const total=items.reduce((s,i)=>s+(+i.rakam||0),0);
  const baki=items.reduce((s,i)=>s+(i.baki||0),0);
  const mila=total-baki;
  let html = `
    <div class="stats-grid" style="margin-bottom:16px">
      <div class="stat-card" style="border:1.5px solid #d9780630"><div class="stat-label">कुल उधार</div><div class="stat-val" style="color:#d97706">${fMoney(total)}</div></div>
      <div class="stat-card" style="border:1.5px solid #16a34a30"><div class="stat-label">वसूली</div><div class="stat-val" style="color:#16a34a">${fMoney(mila)}</div></div>
      <div class="stat-card" style="border:1.5px solid #ef444430"><div class="stat-label">बाकी</div><div class="stat-val" style="color:#ef4444">${fMoney(baki)}</div></div>
    </div>
    <div class="flex-end" style="margin-bottom:12px">
      <button class="btn" style="background:#d97706;color:#fff" onclick="openUdharForm()">+ नया उधार</button>
    </div>`;
  if(!items.length) html+=`<div class="empty"><div class="empty-icon">📋</div>कोई उधार दर्ज नहीं है</div>`;
  else items.forEach(i => {
    const paid=i.baki===0;
    const bc=paid?'#16a34a':'#ef4444';
    const wapsiHtml=(i.wapsi||[]).map(w=>`<span style="font-size:11px;color:#16a34a;margin-right:6px">✓${fMoney(w.amt)}(${fDate(w.date)})</span>`).join('');
    html+=`<div class="card" style="border-color:${paid?'#16a34a40':'#d9780640'}">
      <div class="card-row">
        <div style="flex:1">
          <div style="font-weight:700;font-size:16px;color:#1e293b">👤 ${i.grahak}</div>
          <div style="font-size:13px;color:#64748b">कुल: ${fMoney(i.rakam)} • ${fDate(i.tarikh)}</div>
          ${i.note?`<div style="font-size:12px;color:#94a3b8">📝 ${i.note}</div>`:''}
          ${wapsiHtml?`<div class="mt4">${wapsiHtml}</div>`:''}
          <div class="mt4"><span class="badge" style="color:${bc};border-color:${bc};background:${bc}20">${paid?'✓ चुका दिया':'बाकी: '+fMoney(i.baki)}</span></div>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">
          ${!paid?`<button class="btn btn-sm" style="background:#16a34a;color:#fff" onclick="openWapsi('${i.id}')">वापसी</button>`:''}
          <button onclick="delItem('udhar','${i.id}')" style="background:none;border:none;color:#ef4444;cursor:pointer;font-size:18px">🗑</button>
        </div>
      </div>
    </div>`;
  });
  return html;
}

function openUdharForm() {
  showModal('udhar','नया उधार दर्ज करें',`
    <div class="field"><label>ग्राहक का नाम *</label><input id="u_grahak" placeholder="ग्राहक का नाम" /></div>
    <div class="field"><label>उधार राशि (₹) *</label><input id="u_rakam" type="number" placeholder="0" /></div>
    <div class="field"><label>तारीख</label><input id="u_tarikh" type="date" value="${today()}" /></div>
    <div class="field"><label>वापसी की तारीख (अनुमानित)</label><input id="u_wdate" type="date" /></div>
    <div class="field"><label>नोट / सामान का विवरण</label><input id="u_note" placeholder="किस चीज़ का उधार..." /></div>
    <div class="flex-gap">
      <button class="btn" style="background:#d97706;color:#fff" onclick="saveUdhar()">सेव करें</button>
      <button class="btn btn-outline" style="color:#64748b;border-color:#64748b" onclick="closeModal()">रद्द करें</button>
    </div>`);
}

function saveUdhar() {
  const grahak=document.getElementById('u_grahak').value.trim(), rakam=document.getElementById('u_rakam').value;
  if(!grahak||!rakam){alert('ग्राहक का नाम और राशि जरूरी है');return;}
  const items=DB.get(KEYS.udhar);
  items.unshift({id:uid(),grahak,rakam,tarikh:document.getElementById('u_tarikh').value,wapis_tarikh:document.getElementById('u_wdate').value,note:document.getElementById('u_note').value,baki:+rakam,wapsi:[]});
  DB.set(KEYS.udhar,items); closeModal(); renderContent();
}

function openWapsi(id) {
  showModal('wapsi','वापसी दर्ज करें',`
    <div class="field"><label>वापसी राशि (₹)</label><input id="w_rakam" type="number" placeholder="0" /></div>
    <div class="flex-gap">
      <button class="btn" style="background:#16a34a;color:#fff" onclick="saveWapsi('${id}')">सेव करें</button>
      <button class="btn btn-outline" style="color:#64748b;border-color:#64748b" onclick="closeModal()">रद्द करें</button>
    </div>`);
}

function saveWapsi(id) {
  const amt=+document.getElementById('w_rakam').value;
  if(!amt||amt<=0){alert('वापसी राशि डालें');return;}
  const items=DB.get(KEYS.udhar).map(i => {
    if(i.id!==id) return i;
    return {...i, baki:Math.max(0,(i.baki||0)-amt), wapsi:[...(i.wapsi||[]),{amt,date:today()}]};
  });
  DB.set(KEYS.udhar,items); closeModal(); renderContent();
}

// ── REPORT ───────────────────────────────────────────────────────────
function renderReport() {
  const kharid=DB.get(KEYS.kharid), bikri=DB.get(KEYS.bikri), udhar=DB.get(KEYS.udhar);
  const tK=kharid.reduce((s,i)=>s+(+i.kul||0),0);
  const tB=bikri.reduce((s,i)=>s+(+i.kul||0),0);
  const tU=udhar.reduce((s,i)=>s+(+i.rakam||0),0);
  const bU=udhar.reduce((s,i)=>s+(i.baki||0),0);
  const munafa=tB-tK;
  const billCount=kharid.filter(i=>i.img).length;

  const td=new Date(); const last7=[];
  for(let i=6;i>=0;i--){const d=new Date(td);d.setDate(d.getDate()-i);last7.push(d.toISOString().slice(0,10));}
  const b7=last7.map(date=>({date,amt:bikri.filter(b=>b.tarikh===date).reduce((s,b)=>s+(+b.kul||0),0)}));
  const maxAmt=Math.max(...b7.map(b=>b.amt),1);

  const barHtml=b7.map(({date,amt})=>{
    const h=Math.round((amt/maxAmt)*72)+4;
    const d=new Date(date); const lbl=d.toLocaleDateString('hi-IN',{weekday:'short'});
    return `<div class="bar-col">
      ${amt>0?`<div class="bar-amt" style="color:#16a34a">${fMoney(amt).replace('₹','')}</div>`:'<div class="bar-amt"></div>'}
      <div class="bar" style="height:${h}px;background:${amt>0?'#16a34a':'#e2e8f0'}"></div>
      <div class="bar-label">${lbl}</div>
    </div>`;
  }).join('');

  const bakiList=udhar.filter(i=>i.baki>0);

  return `
    <h3 style="margin:0 0 16px;font-size:17px;font-weight:700;color:#1e293b">📊 हिसाब-किताब सारांश</h3>
    <div class="stat-grid2">
      ${[['📦 कुल खरीद',tK,'#2563eb'],['🛒 कुल बिक्री',tB,'#16a34a'],['💰 अनुमानित मुनाफा',munafa,munafa>=0?'#16a34a':'#ef4444'],['📋 कुल उधार',tU,'#d97706'],['⚠️ उधार बाकी',bU,'#ef4444'],['🧾 बिल फोटो',billCount,'#7c3aed']].map(([l,v,c],idx)=>`
        <div class="stat-card" style="border:1.5px solid ${c}30">
          <div style="font-size:16px;margin-bottom:4px">${l.split(' ')[0]}</div>
          <div style="font-size:11px;color:#64748b;margin-bottom:4px">${l.slice(l.indexOf(' ')+1)}</div>
          <div style="font-size:18px;font-weight:800;color:${c}">${idx>=5?v:fMoney(v)}</div>
        </div>`).join('')}
    </div>
    <div class="card" style="margin-bottom:16px">
      <div style="font-size:13px;font-weight:700;color:#475569;margin-bottom:14px">पिछले 7 दिनों की बिक्री</div>
      <div class="bar-wrap">${barHtml}</div>
    </div>
    <div class="card" style="border-color:#fef3c7">
      <div style="font-size:13px;font-weight:700;color:#92400e;margin-bottom:10px">⚠️ बाकी उधार</div>
      ${bakiList.length===0
        ? '<div style="color:#16a34a;font-size:14px">✅ सभी उधार चुका दिए गए हैं</div>'
        : bakiList.map(i=>`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #fef3c7"><div style="font-weight:600;color:#1e293b">${i.grahak}</div><div style="font-weight:700;color:#ef4444">${fMoney(i.baki)}</div></div>`).join('')}
    </div>`;
}

// ── Delete ────────────────────────────────────────────────────────────
function delItem(type, id) {
  if(!confirm('हटाएं?')) return;
  const key=KEYS[type];
  DB.set(key, DB.get(key).filter(i=>i.id!==id));
  renderContent();
}

// ── Render ────────────────────────────────────────────────────────────
function renderContent() {
  const el=document.getElementById('appContent');
  if(activeTab==='kharid') el.innerHTML=renderKharid();
  else if(activeTab==='bikri') el.innerHTML=renderBikri();
  else if(activeTab==='udhar') el.innerHTML=renderUdhar();
  else if(activeTab==='report') el.innerHTML=renderReport();
}

// ── PWA Install ───────────────────────────────────────────────────────
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt', e=>{
  e.preventDefault(); deferredPrompt=e;
  document.getElementById('installBanner').classList.remove('hidden');
});
function installApp(){
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(()=>{ deferredPrompt=null; document.getElementById('installBanner').classList.add('hidden'); });
}
window.addEventListener('appinstalled',()=>{ document.getElementById('installBanner').classList.add('hidden'); });

// ── Service Worker ────────────────────────────────────────────────────
if('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

// ── Init ──────────────────────────────────────────────────────────────
renderTabs();
renderContent();
</script>
</body>
</html>
